{% extends "base.html" %}

{% block title %}Login - App Motoristas{% endblock %}

{% block main_content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right text-primary"></i> Login
                </h2>
                
                <form method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                <label class="form-check-label" for="remember">Lembrar-me</label>
                            </div>
                            <a href="{{ url_for('auth.esqueci_senha') }}" class="text-decoration-none small">
                                Esqueci minha senha
                            </a>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">Entrar</button>
                </form>
                
                <hr class="my-4">
                
                <p class="text-center mb-0">
                    Não tem uma conta? <a href="{{ url_for('auth.cadastro') }}">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
